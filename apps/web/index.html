<!DOCTYPE html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iClaw" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>iClaw</title>
    <meta name="description" content="OpenClaw Agentic Workflow" />
    <!--
      #235: Apply stored theme before any paint to prevent FOUC.
      Reads `awf:theme` from localStorage, resolves "system" against
      prefers-color-scheme, then toggles the `dark` class on <html>.
      Defaults to dark so existing installs keep current behaviour.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("awf:theme");
          var theme = stored === "light" || stored === "dark" || stored === "system" ? stored : "dark";
          var resolved = theme === "system"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : theme;
          document.documentElement.classList.toggle("dark", resolved === "dark");
        } catch (_) { /* keep default dark class */ }
      })();
    </script>
  </head>
  <body class="antialiased safe-left safe-right">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
